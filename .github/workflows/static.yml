<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEVLAB — Experimental Projects & Digital Builds</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #020408;
    --bg2: #060d14;
    --accent: #00f5c4;
    --accent2: #ff3d6b;
    --accent3: #7b61ff;
    --text: #e8edf2;
    --muted: #4a6070;
    --card-bg: rgba(6,18,28,0.85);
    --border: rgba(0,245,196,0.15);
    --glow: 0 0 30px rgba(0,245,196,0.25);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    overflow-x: hidden;
    cursor: none;
  }

  /* CUSTOM CURSOR */
  #cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: var(--accent);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%,-50%);
    transition: transform 0.05s, width 0.2s, height 0.2s, background 0.2s;
    mix-blend-mode: screen;
  }
  #cursor-ring {
    position: fixed;
    width: 40px; height: 40px;
    border: 1px solid rgba(0,245,196,0.5);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9998;
    transform: translate(-50%,-50%);
    transition: transform 0.12s ease, width 0.3s, height 0.3s;
  }
  body:hover #cursor-ring { opacity: 1; }

  /* CANVAS */
  #bg-canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
    pointer-events: none;
  }

  /* NAV */
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 48px;
    background: linear-gradient(to bottom, rgba(2,4,8,0.9) 0%, transparent 100%);
    backdrop-filter: blur(2px);
  }

  .nav-logo {
    font-family: 'Orbitron', monospace;
    font-weight: 900;
    font-size: 1.1rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-decoration: none;
    position: relative;
  }
  .nav-logo::after {
    content: '_';
    animation: blink 1s infinite;
    color: var(--accent2);
  }
  @keyframes blink { 0%,49%{opacity:1} 50%,100%{opacity:0} }

  .nav-links {
    display: flex;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.3s;
    position: relative;
  }
  .nav-links a::after {
    content: '';
    position: absolute;
    bottom: -4px;
    left: 0; width: 0;
    height: 1px;
    background: var(--accent);
    transition: width 0.3s;
  }
  .nav-links a:hover { color: var(--accent); }
  .nav-links a:hover::after { width: 100%; }

  .nav-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--accent);
    letter-spacing: 0.1em;
  }
  .status-dot {
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse-dot 2s infinite;
    box-shadow: 0 0 8px var(--accent);
  }
  @keyframes pulse-dot {
    0%,100%{opacity:1; transform:scale(1)}
    50%{opacity:0.4; transform:scale(0.6)}
  }

  /* HERO */
  #hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    overflow: hidden;
  }

  .hero-content {
    text-align: center;
    position: relative;
    z-index: 2;
    padding: 0 20px;
  }

  .hero-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.8s 0.3s forwards;
  }

  .hero-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(3rem, 10vw, 8rem);
    font-weight: 900;
    line-height: 0.9;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
    opacity: 0;
    animation: fadeUp 0.8s 0.5s forwards;
  }

  .hero-title .line1 {
    display: block;
    background: linear-gradient(135deg, #fff 0%, var(--accent) 50%, #fff 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: fadeUp 0.8s 0.5s forwards, shimmer 4s 1.5s infinite;
  }
  .hero-title .line2 {
    display: block;
    color: transparent;
    -webkit-text-stroke: 1px rgba(255,255,255,0.2);
    font-size: 0.85em;
  }

  @keyframes shimmer {
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
  }

  .hero-subtitle {
    font-size: clamp(0.9rem, 2vw, 1.1rem);
    color: var(--muted);
    max-width: 500px;
    margin: 28px auto 0;
    line-height: 1.7;
    font-weight: 400;
    opacity: 0;
    animation: fadeUp 0.8s 0.7s forwards;
  }

  .hero-cta {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 40px;
    opacity: 0;
    animation: fadeUp 0.8s 0.9s forwards;
  }

  .btn-primary {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 32px;
    background: var(--accent);
    color: #000;
    border: none;
    cursor: none;
    text-decoration: none;
    font-weight: 700;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.3s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn-primary:hover {
    box-shadow: 0 0 40px rgba(0,245,196,0.5);
  }
  .btn-primary::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(45deg, transparent 30%, rgba(255,255,255,0.3) 50%, transparent 70%);
    transform: translateX(-100%);
    transition: transform 0.5s;
  }
  .btn-primary:hover::after { transform: translateX(100%); }

  .btn-outline {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 32px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--border);
    cursor: none;
    text-decoration: none;
    transition: border-color 0.3s, color 0.3s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn-outline:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  /* SCROLL INDICATOR */
  .scroll-indicator {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    opacity: 0;
    animation: fadeUp 0.8s 1.2s forwards;
  }
  .scroll-indicator span {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .scroll-line {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, var(--accent), transparent);
    animation: scrollPulse 2s infinite;
  }
  @keyframes scrollPulse {
    0%{transform:scaleY(0); transform-origin:top; opacity:1}
    50%{transform:scaleY(1); transform-origin:top; opacity:1}
    51%{transform:scaleY(1); transform-origin:bottom; opacity:1}
    100%{transform:scaleY(0); transform-origin:bottom; opacity:0}
  }

  /* SECTIONS */
  section {
    position: relative;
    z-index: 1;
  }

  .section-header {
    display: flex;
    align-items: flex-end;
    gap: 20px;
    margin-bottom: 64px;
  }

  .section-number {
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    color: var(--accent);
    letter-spacing: 0.2em;
    padding-bottom: 4px;
    white-space: nowrap;
  }

  .section-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(1.8rem, 5vw, 3.5rem);
    font-weight: 900;
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .section-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(to right, var(--border), transparent);
    margin-bottom: 8px;
  }

  /* ABOUT / STATS */
  #about {
    padding: 120px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: center;
  }

  .about-text p {
    font-size: 1.05rem;
    line-height: 1.8;
    color: rgba(232,237,242,0.7);
    margin-bottom: 20px;
  }

  .about-text p strong {
    color: var(--accent);
    font-weight: 600;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
  }

  .stat-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 32px;
    position: relative;
    overflow: hidden;
    transition: border-color 0.3s, transform 0.3s;
  }
  .stat-card:hover {
    border-color: var(--accent);
    transform: translateY(-4px);
  }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px; height: 100%;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.3s;
  }
  .stat-card:hover::before { transform: scaleY(1); }

  .stat-number {
    font-family: 'Orbitron', monospace;
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
    margin-bottom: 8px;
  }

  .stat-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
  }

  /* PROJECTS */
  #projects {
    padding: 120px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 2px;
  }

  .project-card {
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: none;
    transition: border-color 0.4s;
    group: true;
  }

  .project-card:hover {
    border-color: rgba(0,245,196,0.4);
  }

  .project-card.featured {
    grid-column: span 2;
  }

  .project-visual {
    height: 260px;
    position: relative;
    overflow: hidden;
    background: var(--bg2);
  }

  .project-card.featured .project-visual {
    height: 340px;
  }

  .project-canvas-3d {
    width: 100%;
    height: 100%;
  }

  .project-overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, var(--card-bg) 0%, transparent 60%);
    z-index: 1;
  }

  .project-tag {
    position: absolute;
    top: 20px;
    right: 20px;
    z-index: 2;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 4px 10px;
    border: 1px solid var(--accent);
    color: var(--accent);
    background: rgba(0,245,196,0.05);
  }

  .project-status {
    position: absolute;
    top: 20px;
    left: 20px;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .project-status.live { color: #00ff88; }
  .project-status.wip { color: #ffaa00; }
  .project-status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
    animation: pulse-dot 2s infinite;
  }

  .project-body {
    padding: 28px 28px 32px;
    position: relative;
    z-index: 2;
  }

  .project-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    margin-bottom: 8px;
  }

  .project-title {
    font-family: 'Orbitron', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 10px;
    line-height: 1.2;
    transition: color 0.3s;
  }
  .project-card:hover .project-title { color: var(--accent); }

  .project-desc {
    font-size: 0.85rem;
    line-height: 1.7;
    color: rgba(232,237,242,0.55);
    margin-bottom: 20px;
  }

  .project-tech {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tech-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    color: var(--muted);
    transition: all 0.3s;
  }
  .project-card:hover .tech-tag {
    border-color: rgba(0,245,196,0.2);
    color: rgba(0,245,196,0.7);
  }

  .project-arrow {
    position: absolute;
    bottom: 28px;
    right: 28px;
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--muted);
    transition: all 0.3s;
    font-size: 1.1rem;
    clip-path: polygon(4px 0%, 100% 0%, calc(100% - 4px) 100%, 0% 100%);
  }
  .project-card:hover .project-arrow {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* THREAT MAP SECTION */
  #live {
    padding: 120px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .threat-container {
    position: relative;
    background: var(--card-bg);
    border: 1px solid var(--border);
    overflow: hidden;
    padding: 48px;
  }

  .threat-container::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at 30% 50%, rgba(0,245,196,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  #map-canvas {
    width: 100%;
    height: 500px;
    border: 1px solid var(--border);
    background: #030a10;
  }

  .map-hud {
    position: absolute;
    top: 60px;
    right: 60px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .hud-item {
    background: rgba(2,4,8,0.9);
    border: 1px solid var(--border);
    padding: 16px 20px;
    min-width: 160px;
  }

  .hud-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .hud-value {
    font-family: 'Orbitron', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent);
  }

  /* SKILLS / STACK */
  #stack {
    padding: 120px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .stack-marquee-wrapper {
    overflow: hidden;
    margin-top: 60px;
    position: relative;
  }
  .stack-marquee-wrapper::before,
  .stack-marquee-wrapper::after {
    content: '';
    position: absolute;
    top: 0; bottom: 0;
    width: 120px;
    z-index: 2;
  }
  .stack-marquee-wrapper::before {
    left: 0;
    background: linear-gradient(to right, var(--bg), transparent);
  }
  .stack-marquee-wrapper::after {
    right: 0;
    background: linear-gradient(to left, var(--bg), transparent);
  }

  .stack-marquee {
    display: flex;
    gap: 0;
    animation: marquee 30s linear infinite;
    white-space: nowrap;
  }
  .stack-marquee:hover { animation-play-state: paused; }

  @keyframes marquee {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }

  .stack-item {
    display: inline-flex;
    align-items: center;
    gap: 12px;
    padding: 20px 32px;
    border-right: 1px solid var(--border);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    transition: color 0.3s;
    flex-shrink: 0;
  }
  .stack-item:hover { color: var(--accent); }

  .stack-icon {
    font-size: 1.2rem;
    filter: grayscale(1);
    transition: filter 0.3s;
  }
  .stack-item:hover .stack-icon { filter: none; }

  /* FEATURED BUILD */
  #featured {
    padding: 120px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .featured-build {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2px;
    background: var(--bg2);
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .featured-visual {
    position: relative;
    background: var(--bg);
    min-height: 500px;
    overflow: hidden;
  }

  #featured-canvas {
    width: 100%;
    height: 100%;
    position: absolute;
    inset: 0;
  }

  .featured-info {
    padding: 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    background: var(--card-bg);
  }

  .featured-eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 24px;
  }

  .featured-title {
    font-family: 'Orbitron', monospace;
    font-size: 2.2rem;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 20px;
  }

  .featured-desc {
    font-size: 0.95rem;
    line-height: 1.8;
    color: rgba(232,237,242,0.6);
    margin-bottom: 32px;
  }

  .featured-metrics {
    display: flex;
    gap: 32px;
    margin-bottom: 40px;
    padding-top: 32px;
    border-top: 1px solid var(--border);
  }

  .metric {
    flex: 1;
  }

  .metric-value {
    font-family: 'Orbitron', monospace;
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--accent2);
  }

  .metric-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 4px;
  }

  /* CONTACT */
  #contact {
    padding: 120px 48px;
    max-width: 1400px;
    margin: 0 auto;
  }

  .contact-inner {
    background: var(--card-bg);
    border: 1px solid var(--border);
    padding: 80px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .contact-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(123,97,255,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .contact-inner::after {
    content: 'CONNECT';
    position: absolute;
    bottom: -20px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Orbitron', monospace;
    font-size: 8rem;
    font-weight: 900;
    color: rgba(255,255,255,0.02);
    letter-spacing: 0.2em;
    white-space: nowrap;
    pointer-events: none;
  }

  .contact-title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(2rem, 5vw, 4rem);
    font-weight: 900;
    margin-bottom: 20px;
    position: relative;
  }

  .contact-sub {
    font-size: 1rem;
    color: rgba(232,237,242,0.5);
    max-width: 500px;
    margin: 0 auto 48px;
    line-height: 1.7;
    position: relative;
  }

  .contact-links {
    display: flex;
    justify-content: center;
    gap: 16px;
    flex-wrap: wrap;
    position: relative;
  }

  .contact-link {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 28px;
    border: 1px solid var(--border);
    color: var(--text);
    text-decoration: none;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 10px;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .contact-link:hover {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
  }

  /* FOOTER */
  footer {
    position: relative;
    z-index: 1;
    padding: 40px 48px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  footer .foot-logo {
    font-family: 'Orbitron', monospace;
    font-size: 0.9rem;
    font-weight: 900;
    color: var(--accent);
    letter-spacing: 0.1em;
  }

  footer .foot-right {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  footer .foot-links {
    display: flex;
    gap: 24px;
    list-style: none;
  }
  footer .foot-links a {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.3s;
  }
  footer .foot-links a:hover { color: var(--accent); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* REVEAL ANIMATIONS */
  .reveal {
    opacity: 0;
    transform: translateY(40px);
    transition: opacity 0.7s, transform 0.7s;
  }
  .reveal.visible {
    opacity: 1;
    transform: none;
  }

  /* GRID OVERLAY */
  .grid-overlay {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(0,245,196,0.02) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,245,196,0.02) 1px, transparent 1px);
    background-size: 80px 80px;
  }

  /* NOISE TEXTURE */
  .noise {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* SCANLINES */
  .scanlines {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
  }

  /* TYPING ANIMATION */
  .typewriter {
    border-right: 2px solid var(--accent);
    white-space: nowrap;
    overflow: hidden;
    animation: typing 2s steps(20,end) 1s both, blink-cursor 0.7s 3s infinite;
  }
  @keyframes typing {
    from { width: 0 }
    to { width: 100% }
  }
  @keyframes blink-cursor {
    from,to { border-color: transparent }
    50% { border-color: var(--accent) }
  }

  /* HEXAGON DECORATIONS */
  .hex-deco {
    position: absolute;
    width: 200px; height: 200px;
    opacity: 0.05;
    pointer-events: none;
  }

  /* RESPONSIVE */
  @media (max-width: 900px) {
    nav { padding: 20px 24px; }
    .nav-links { display: none; }
    #about, #projects, #live, #stack, #featured, #contact { padding: 80px 24px; }
    .about-grid { grid-template-columns: 1fr; gap: 48px; }
