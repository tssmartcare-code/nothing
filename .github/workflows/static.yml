<!-- THREE.JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ============================================================
// CURSOR
// ============================================================
const cursor = document.getElementById('cursor');
const ring = document.getElementById('cursor-ring');
let mx = -100, my = -100, rx = -100, ry = -100;

document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
function animateCursor() {
  cursor.style.left = mx + 'px';
  cursor.style.top = my + 'px';
  rx += (mx - rx) * 0.1;
  ry += (my - ry) * 0.1;
  ring.style.left = rx + 'px';
  ring.style.top = ry + 'px';
  requestAnimationFrame(animateCursor);
}
animateCursor();

document.querySelectorAll('a, button, .project-card, .stat-card').forEach(el => {
  el.addEventListener('mouseenter', () => {
    cursor.style.width = '20px';
    cursor.style.height = '20px';
    ring.style.width = '60px';
    ring.style.height = '60px';
  });
  el.addEventListener('mouseleave', () => {
    cursor.style.width = '12px';
    cursor.style.height = '12px';
    ring.style.width = '40px';
    ring.style.height = '40px';
  });
});

// ============================================================
// BACKGROUND 3D (Particle Field)
// ============================================================
(function() {
  const canvas = document.getElementById('bg-canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
  renderer.setSize(window.innerWidth, window.innerHeight);

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.z = 5;

  // Particle system
  const N = 3000;
  const geo = new THREE.BufferGeometry();
  const pos = new Float32Array(N * 3);
  const col = new Float32Array(N * 3);
  for (let i = 0; i < N; i++) {
    pos[i*3] = (Math.random() - 0.5) * 40;
    pos[i*3+1] = (Math.random() - 0.5) * 30;
    pos[i*3+2] = (Math.random() - 0.5) * 20;
    const r = Math.random();
    if (r < 0.6) { col[i*3]=0; col[i*3+1]=0.96; col[i*3+2]=0.77; }
    else if (r < 0.8) { col[i*3]=1; col[i*3+1]=0.24; col[i*3+2]=0.42; }
    else { col[i*3]=0.48; col[i*3+1]=0.38; col[i*3+2]=1; }
  }
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color', new THREE.BufferAttribute(col, 3));

  const mat = new THREE.PointsMaterial({ size: 0.04, vertexColors: true, transparent: true, opacity: 0.6 });
  const points = new THREE.Points(geo, mat);
  scene.add(points);

  // Floating wireframe spheres
  const spheres = [];
  for (let i = 0; i < 5; i++) {
    const sg = new THREE.IcosahedronGeometry(Math.random() * 0.8 + 0.3, 1);
    const sm = new THREE.MeshBasicMaterial({ color: 0x00f5c4, wireframe: true, opacity: 0.05, transparent: true });
    const mesh = new THREE.Mesh(sg, sm);
    mesh.position.set((Math.random()-0.5)*10, (Math.random()-0.5)*8, (Math.random()-0.5)*5 - 3);
    mesh.userData = { rx: (Math.random()-0.5)*0.005, ry: (Math.random()-0.5)*0.008 };
    scene.add(mesh);
    spheres.push(mesh);
  }

  let mouseX = 0, mouseY = 0;
  document.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 0.5;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 0.5;
  });

  let t = 0;
  function animate() {
    requestAnimationFrame(animate);
    t += 0.001;
    points.rotation.y += 0.0003;
    points.rotation.x += 0.0001;
    camera.position.x += (mouseX - camera.position.x) * 0.02;
    camera.position.y += (-mouseY - camera.position.y) * 0.02;
    spheres.forEach(s => { s.rotation.x += s.userData.rx; s.rotation.y += s.userData.ry; });
    renderer.render(scene, camera);
  }
  animate();

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });
})();

// ============================================================
// PROJECT CANVAS ANIMATIONS
// ============================================================
function makeProjectScene(canvasId, colorHex, type) {
  const canvas = document.getElementById(canvasId);
  if (!canvas) return;
  const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(canvas.clientWidth || canvas.offsetWidth, canvas.clientHeight || canvas.offsetHeight);

  const scene = new THREE.Scene();
  const w = canvas.clientWidth || canvas.offsetWidth;
  const h = canvas.clientHeight || canvas.offsetHeight;
  const camera = new THREE.PerspectiveCamera(50, w/h, 0.1, 100);
  camera.position.z = 4;

  const color = colorHex;

  if (type === 'globe') {
    // Globe with arcs
    const sg = new THREE.SphereGeometry(1.2, 32, 32);
    const sm = new THREE.MeshBasicMaterial({ color: 0x00f5c4, wireframe: true, opacity: 0.15, transparent: true });
    const sphere = new THREE.Mesh(sg, sm);
    scene.add(sphere);

    // Dots on surface
    const dg = new THREE.BufferGeometry();
    const dp = [];
    for (let i = 0; i < 200; i++) {
      const phi = Math.acos(2 * Math.random() - 1);
      const theta = Math.random() * Math.PI * 2;
      dp.push(1.22 * Math.sin(phi) * Math.cos(theta));
      dp.push(1.22 * Math.sin(phi) * Math.sin(theta));
      dp.push(1.22 * Math.cos(phi));
    }
    dg.setAttribute('position', new THREE.BufferAttribute(new Float32Array(dp), 3));
    const dm = new THREE.PointsMaterial({ color: 0x00f5c4, size: 0.04 });
    scene.add(new THREE.Points(dg, dm));

    function animate() {
      requestAnimationFrame(animate);
      sphere.rotation.y += 0.004;
      renderer.render(scene, camera);
    }
    animate();

  } else if (type === 'torus') {
    const tg = new THREE.TorusGeometry(1, 0.4, 16, 60);
    const tm = new THREE.MeshBasicMaterial({ color, wireframe: true, opacity: 0.2, transparent: true });
    const torus = new THREE.Mesh(tg, tm);
    scene.add(torus);
    const pg = new THREE.TorusGeometry(1, 0.4, 16, 60);
    const pm = new THREE.PointsMaterial({ color, size: 0.02 });
    scene.add(new THREE.Points(pg, pm));
    function animate() {
      requestAnimationFrame(animate);
      torus.rotation.x += 0.005;
      torus.rotation.y += 0.003;
      renderer.render(scene, camera);
    }
    animate();

  } else if (type === 'grid') {
    const g = new THREE.GridHelper(4, 10, color, color);
    g.material.opacity = 0.2;
    g.material.transparent = true;
    scene.add(g);
    camera.position.set(0, 2, 4);
    camera.lookAt(0,0,0);
    const cube = new THREE.Mesh(new THREE.BoxGeometry(0.8,0.8,0.8), new THREE.MeshBasicMaterial({color, wireframe:true, opacity:0.4, transparent:true}));
    scene.add(cube);
    function animate() {
      requestAnimationFrame(animate);
      cube.rotation.x += 0.01;
      cube.rotation.y += 0.007;
      g.rotation.y += 0.002;
      renderer.render(scene, camera);
    }
    animate();

  } else if (type === 'neural') {
    // Neural net-like lines
    const nodes = [];
    const layers = [3, 5, 5, 3];
    const meshes = [];
    layers.forEach((count, li) => {
      const x = (li - 1.5) * 1.2;
      for (let i = 0; i < count; i++) {
        const y = (i - (count-1)/2) * 0.7;
        const sg = new THREE.SphereGeometry(0.06, 8, 8);
        const sm = new THREE.MeshBasicMaterial({ color });
        const m = new THREE.Mesh(sg, sm);
        m.position.set(x, y, 0);
        scene.add(m);
        nodes.push(m);
        meshes.push(m);
      }
    });
    // Connections
    let prev = 0;
    for (let l = 0; l < layers.length - 1; l++) {
      for (let a = 0; a < layers[l]; a++) {
        for (let b = 0; b < layers[l+1]; b++) {
          const pts = [nodes[prev+a].position, nodes[prev+layers[l]+b].position];
          const lg = new THREE.BufferGeometry().setFromPoints(pts);
          const lm = new THREE.LineBasicMaterial({ color, opacity: 0.15, transparent: true });
          scene.add(new THREE.Line(lg, lm));
        }
      }
      prev += layers[l];
    }
    function animate() {
      requestAnimationFrame(animate);
      meshes.forEach((m, i) => {
        m.scale.setScalar(0.8 + 0.2 * Math.sin(Date.now()*0.003 + i));
      });
      renderer.render(scene, camera);
    }
    animate();

  } else if (type === 'dashboard') {
    // Rings
    for (let i = 0; i < 4; i++) {
      const rg = new THREE.RingGeometry(0.4 + i*0.4, 0.42 + i*0.4, 64);
      const rm = new THREE.MeshBasicMaterial({ color: i%2===0?color:0xff3d6b, side: THREE.DoubleSide, opacity: 0.3 - i*0.05, transparent: true });
      const ring = new THREE.Mesh(rg, rm);
      ring.userData = { speed: 0.003 * (i%2===0?1:-1) };
      scene.add(ring);
    }
    scene.children.forEach(m => {
      m.rotation.x = 0.4;
    });
    function animate() {
      requestAnimationFrame(animate);
      scene.children.forEach(m => {
        if (m.userData.speed) m.rotation.z += m.userData.speed;
      });
      renderer.render(scene, camera);
    }
    animate();
  }
}

// Wait for layout then init canvases
window.addEventListener('load', () => {
  setTimeout(() => {
    makeProjectScene('proj-canvas-1', 0x00f5c4, 'globe');
    makeProjectScene('proj-canvas-2', 0xff3d6b, 'torus');
    makeProjectScene('proj-canvas-3', 0x7b61ff, 'grid');
    makeProjectScene('proj-canvas-4', 0xffaa00, 'neural');
    makeProjectScene('proj-canvas-5', 0x00f5c4, 'dashboard');
  }, 200);
});

// ============================================================
// LIVE MAP CANVAS (2D)
// ============================================================
(function() {
  const canvas = document.getElementById('map-canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const W = () => canvas.width;
  const H = () => canvas.height;

  // World map dots (simplified continents as random clusters)
  const continentCenters = [
    {x:0.2, y:0.4, r:0.12, label:'NA'}, {x:0.3, y:0.65, r:0.08, label:'SA'},
    {x:0.45, y:0.38, r:0.08, label:'EU'}, {x:0.5, y:0.55, r:0.1, label:'AF'},
    {x:0.65, y:0.35, r:0.14, label:'AS'}, {x:0.78, y:0.6, r:0.08, label:'OC'}
  ];

  const dots = [];
  continentCenters.forEach(c => {
    for (let i = 0; i < 80; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = Math.random() * c.r;
      dots.push({ nx: c.x + Math.cos(angle)*dist, ny: c.y + Math.sin(angle)*dist });
    }
  });

  // Active nodes
  const nodes = [];
  for (let i = 0; i < 20; i++) {
    const cc = continentCenters[Math.floor(Math.random()*continentCenters.length)];
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * cc.r * 0.8;
    nodes.push({ nx: cc.x + Math.cos(angle)*dist, ny: cc.y + Math.sin(angle)*dist, pulse: Math.random() * Math.PI * 2 });
  }

  // Events (arcs)
  const events = [];
  function spawnEvent() {
    const src = nodes[Math.floor(Math.random()*nodes.length)];
    const dst = nodes[Math.floor(Math.random()*nodes.length)];
    if (src === dst) return;
    events.push({ src, dst, progress: 0, speed: 0.008 + Math.random()*0.012, color: Math.random() < 0.5 ? '#00f5c4' : '#ff3d6b' });
  }
  setInterval(spawnEvent, 800);
  for (let i = 0; i < 5; i++) spawnEvent();

  // HUD update
  const hudNodes = document.getElementById('hud-nodes');
  const hudEvents = document.getElementById('hud-events');
  setInterval(() => {
    if (hudNodes) hudNodes.textContent = 115 + Math.floor(Math.random()*30);
    if (hudEvents) hudEvents.textContent = (2 + Math.random()*4).toFixed(1);
  }, 1500);

  function lerp(a,b,t){return a+(b-a)*t;}

  function draw() {
    ctx.clearRect(0, 0, W(), H());

    // Background
    ctx.fillStyle = '#030a10';
    ctx.fillRect(0,0,W(),H());

    // Grid
    ctx.strokeStyle = 'rgba(0,245,196,0.04)';
    ctx.lineWidth = 0.5;
    for (let x = 0; x < W(); x += 40) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H()); ctx.stroke(); }
    for (let y = 0; y < H(); y += 40) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W(),y); ctx.stroke(); }

    // Map dots
    dots.forEach(d => {
      ctx.fillStyle = 'rgba(0,245,196,0.12)';
      ctx.beginPath();
      ctx.arc(d.nx*W(), d.ny*H(), 1.5, 0, Math.PI*2);
      ctx.fill();
    });

    const now = Date.now() * 0.001;

    // Event arcs
    for (let i = events.length - 1; i >= 0; i--) {
      const e = events[i];
      e.progress += e.speed;
      if (e.progress > 1) { events.splice(i, 1); continue; }

      const sx = e.src.nx * W(), sy = e.src.ny * H();
      const dx = e.dst.nx * W(), dy = e.dst.ny * H();
      const cx2 = (sx+dx)/2, cy2 = (sy+dy)/2 - Math.hypot(dx-sx, dy-sy) * 0.3;

      // Draw line up to progress
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      for (let t2 = 0; t2 <= e.progress; t2 += 0.05) {
        const bx = (1-t2)*(1-t2)*sx + 2*(1-t2)*t2*cx2 + t2*t2*dx;
        const by = (1-t2)*(1-t2)*sy + 2*(1-t2)*t2*cy2 + t2*t2*dy;
        ctx.lineTo(bx, by);
      }
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.7 * (1 - e.progress * 0.5);
      ctx.stroke();
      ctx.globalAlpha = 1;

      // Dot at progress
      const t2 = e.progress;
      const px = (1-t2)*(1-t2)*sx + 2*(1-t2)*t2*cx2 + t2*t2*dx;
      const py = (1-t2)*(1-t2)*sy + 2*(1-t2)*t2*cy2 + t2*t2*dy;
      ctx.beginPath();
      ctx.arc(px, py, 3, 0, Math.PI*2);
      ctx.fillStyle = e.color;
      ctx.fill();
    }

    // Active nodes
    nodes.forEach(n => {
      const nx2 = n.nx * W(), ny2 = n.ny * H();
      const pulse = 0.5 + 0.5 * Math.sin(now * 2 + n.pulse);

      // Pulse ring
      ctx.beginPath();
      ctx.arc(nx2, ny2, 4 + pulse*8, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(0,245,196,${0.3 * (1 - pulse)})`;
      ctx.lineWidth = 1;
      ctx.stroke();

      // Core
      ctx.beginPath();
      ctx.arc(nx2, ny2, 3, 0, Math.PI*2);
      ctx.fillStyle = '#00f5c4';
      ctx.fill();
    });

    // Scanline overlay
    const grad = ctx.createLinearGradient(0,0,0,H());
    grad.addColorStop(0, 'rgba(0,245,196,0.03)');
    grad.addColorStop(1, 'rgba(0,0,0,0.1)');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,W(),H());

    requestAnimationFrame(draw);
  }
  draw();
})();

// ============================================================
// SCROLL REVEAL
// ============================================================
const reveals = document.querySelectorAll('.reveal');
const obs = new IntersectionObserver(entries => {
  entries.forEach((e, i) => {
    if (e.isIntersecting) {
      setTimeout(() => e.target.classList.add('visible'), i * 100);
    }
  });
}, { threshold: 0.1 });
reveals.forEach(r => obs.observe(r));

// ============================================================
// COUNT-UP ANIMATION
// ============================================================
const counters = document.querySelectorAll('[data-count]');
const countObs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const el = e.target;
      const target = +el.dataset.count;
      let current = 0;
      const increment = target / 50;
      const timer = setInterval(() => {
        current = Math.min(current + increment, target);
        el.textContent = Math.round(current) + (target === 99 ? '%' : '+');
        if (current >= target) clearInterval(timer);
      }, 30);
      countObs.unobserve(el);
    }
  });
}, { threshold: 0.5 });
counters.forEach(c => countObs.observe(c));
</script>
